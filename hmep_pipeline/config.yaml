# HMEP pipeline config

outlook:
  folder_name: ""
  sender_email: "hmepopencrossclass@umin.ac.jp"
  subject_must_contain: "HMEP"
  # レクチャー「開催日」で台帳を絞る（出力に含める開催日の範囲）
  lecture_date_from: "2025-01-01"
  lecture_date_to: "2026-05-31"
  # メール「受信日」の走査範囲（2025/1 開催でも 2024年中に案内が来ることがあるため広めに）
  received_date_from: "2024-06-01"
  received_date_to: "2026-12-31"
  # true なら、data/lectures.xlsx にある開催日の最大値以降に受信したメールだけを走査（負荷軽減）。初回のみ・過去を一括再取り込みする場合は false
  scan_from_last_lecture_date: true

parse:
  subject_date_patterns: []
  allow_empty_description: true
  # 略歴ブロックがなくても行を作る（本文に 【講師紹介】 のみ等）
  allow_empty_biography: true
  # 1通に複数回分のブロックがある場合に分割して抽出
  split_multiple_sessions: true

rename:
  # リネーム対象レクチャー日の範囲（全件不要のため抽出期間と同一でよい）
  date_from: "2025-01-01"
  date_to: "2026-05-31"
  time_window_hours: 24
  similarity_threshold: 0.22
  # strict で落ちた行のフォールバック: (A) パスに開催日が含まれる候補 (B) 時間窓内の最高類似度。どちらもこの下限以上なら採用
  similarity_fallback: 0.10
  recursive: true
  extensions:
    - ".mp4"
    - ".mov"
    - ".avi"
    - ".mkv"

paths:
  data_dir: "data"
  # 実際の収録動画はリポジトリルート直下の 2025/ を想定（必要に応じて変更）
  videos_dir: "../2025"
  videos_renamed_dir: "videos_renamed"
  lectures_xlsx: "data/lectures.xlsx"
  upload_log_csv: "data/upload_log.csv"
  logs_dir: "logs"
  credentials_dir: "credentials"

youtube:
  # Google Cloud のデスクトップ OAuth 用 JSON（Git に含めない）
  client_secrets_file: "credentials/client_secrets.json"
  token_file: "credentials/token.json"
  description_template_file: "03_upload/description_template.txt"
  # アップロード後にここへ追加。空ならプレイリスト登録をスキップ
  playlist_id: ""
  # 教育カテゴリ（既定 27）。チャンネル地域で異なる場合は要確認
  category_id: "27"
  default_language: "ja"
  privacy_status: "unlisted"
  # YouTube Data API クォータ対策: 1 実行でアップロードする上限（0＝制限なし）
  max_uploads_per_run: 6
